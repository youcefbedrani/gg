<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Background -->
  <rect width="400" height="400" fill="#F5F5DC" />
  
  <!-- Vase -->
  <path d="M160,350 L240,350 L250,280 L150,280 Z" fill="#87CEEB" opacity="0.7" />
  <ellipse cx="200" cy="280" rx="50" ry="8" fill="#50C878" opacity="0.4" />
  
  <!-- Stems -->
  <line x1="200" y1="280" x2="160" y2="180" stroke="#308014" stroke-width="4" />
  <line x1="200" y1="280" x2="200" y2="150" stroke="#308014" stroke-width="4" />
  <line x1="200" y1="280" x2="240" y2="190" stroke="#308014" stroke-width="4" />
  
  <!-- Flowers -->
  <!-- Left Pink Rose -->
  <circle cx="160" cy="170" r="30" fill="#FFC0CB" />
  <circle cx="160" cy="170" r="20" fill="#FFB6C1" />
  <circle cx="160" cy="170" r="10" fill="#FF69B4" />
  
  <!-- Center Purple Flower -->
  <g transform="translate(200, 140)">
    <circle cx="0" cy="0" r="12" fill="#FFF44F" />
    <circle cx="-25" cy="0" r="15" fill="#800080" opacity="0.9" />
    <circle cx="25" cy="0" r="15" fill="#800080" opacity="0.9" />
    <circle cx="0" cy="-25" r="15" fill="#800080" opacity="0.9" />
    <circle cx="0" cy="25" r="15" fill="#800080" opacity="0.9" />
  </g>
  
  <!-- Right Red Flower -->
  <circle cx="250" cy="180" r="25" fill="#E32636" />
  <circle cx="250" cy="180" r="8" fill="#FFD700" />
  
  <!-- Green leaves around -->
  <path d="M120,220 C100,190 140,190 140,220 Z" fill="#308014" />
  <path d="M280,220 C300,190 260,190 260,220 Z" fill="#308014" />
</svg>
