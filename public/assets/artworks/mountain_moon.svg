<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="100%" height="100%">
  <!-- Sky background -->
  <rect width="400" height="500" fill="#041F60" />
  
  <!-- Moon -->
  <circle cx="300" cy="120" r="45" fill="#FFFFFF" />
  <circle cx="300" cy="120" r="55" fill="#FFFFFF" opacity="0.1" />
  
  <!-- Mountain Silhouettes -->
  <!-- Back mountains -->
  <polygon points="-50,350 100,180 250,350" fill="#0047AB" opacity="0.8" />
  <polygon points="120,350 280,150 450,350" fill="#0047AB" opacity="0.6" />
  
  <!-- Midground Mountains -->
  <polygon points="20,350 180,220 340,350" fill="#808080" />
  
  <!-- Fore/Ground / Lake -->
  <rect y="350" width="400" height="150" fill="#020E2C" />
  
  <!-- Moon reflection on water -->
  <ellipse cx="300" cy="380" rx="30" ry="2" fill="#FFFFFF" opacity="0.6" />
  <ellipse cx="300" cy="410" rx="20" ry="1.5" fill="#FFFFFF" opacity="0.4" />
  <ellipse cx="300" cy="440" rx="10" ry="1" fill="#FFFFFF" opacity="0.2" />
  
  <!-- Pine tree silhouettes left -->
  <polygon points="20,360 10,380 30,380" fill="#1B1B1B" />
  <polygon points="20,350 5,370 35,370" fill="#1B1B1B" />
  <rect x="18" y="380" width="4" height="20" fill="#1B1B1B" />
</svg>
