<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="sunsetSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8D0A1C" />
      <stop offset="50%" stop-color="#FF5733" />
      <stop offset="100%" stop-color="#FFC300" />
    </linearGradient>
    <linearGradient id="seaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFC300" />
      <stop offset="30%" stop-color="#041F60" />
      <stop offset="100%" stop-color="#020E2C" />
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="400" height="180" fill="url(#sunsetSky)" />
  
  <!-- Sun -->
  <circle cx="200" cy="160" r="35" fill="#FFF" />
  
  <!-- Sea -->
  <rect y="180" width="400" height="120" fill="url(#seaGrad)" />
  
  <!-- Reflections on water -->
  <ellipse cx="200" cy="190" rx="60" ry="4" fill="#FFF" opacity="0.8" />
  <ellipse cx="200" cy="210" rx="40" ry="3" fill="#FFC300" opacity="0.6" />
  <ellipse cx="200" cy="235" rx="25" ry="2" fill="#FF5733" opacity="0.5" />
  
  <!-- Silhouettes of mountains in distance -->
  <path d="M0,180 L80,140 L160,180 L280,150 L340,180 L400,165 L400,180 L0,180 Z" fill="#4A1E25" opacity="0.8" />
</svg>
