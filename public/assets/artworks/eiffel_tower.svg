<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="100%" height="100%">
  <!-- Sky background -->
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF5733" />
      <stop offset="60%" stop-color="#FFC300" />
      <stop offset="100%" stop-color="#87CEEB" />
    </linearGradient>
  </defs>
  <rect width="400" height="500" fill="url(#skyGrad)" />
  
  <!-- Eiffel Tower outline -->
  <path d="M180,480 L185,420 L195,300 L197,120 L203,120 L205,300 L215,420 L220,480 Z" fill="#3B2F2F" />
  <path d="M190,480 C190,440 210,440 210,480 Z" fill="url(#skyGrad)" />
  <!-- Balcony levels -->
  <rect x="175" y="415" width="50" height="8" rx="2" fill="#221100" />
  <rect x="188" y="295" width="24" height="6" rx="2" fill="#221100" />
  <!-- Spire tip -->
  <line x1="200" y1="120" x2="200" y2="80" stroke="#3B2F2F" stroke-width="3" />
  
  <!-- Sun/Atmospheric glow -->
  <circle cx="200" cy="220" r="40" fill="#FFF" opacity="0.4" />
  
  <!-- Foreground street silhouettes & trees -->
  <path d="M0,480 Q100,470 200,480 T400,480 L400,500 L0,500 Z" fill="#1B1B1B" />
  
  <!-- Stylized clouds -->
  <ellipse cx="60" cy="150" rx="40" ry="15" fill="#FFF" opacity="0.6" />
  <ellipse cx="330" cy="120" rx="50" ry="20" fill="#FFF" opacity="0.5" />
</svg>
