<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="100%" height="100%">
  <!-- Sunset/Sky background -->
  <defs>
    <linearGradient id="kaabaSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D112C" />
      <stop offset="50%" stop-color="#4D1E3A" />
      <stop offset="100%" stop-color="#CC7722" />
    </linearGradient>
  </defs>
  <rect width="400" height="500" fill="url(#kaabaSky)" />
  
  <!-- Mosque background arches/minarets silhouette -->
  <path d="M0,500 L0,320 Q20,310 40,320 L40,500 Z" fill="#808080" opacity="0.3" />
  <path d="M360,500 L360,320 Q380,310 400,320 L400,500 Z" fill="#808080" opacity="0.3" />
  <line x1="20" y1="315" x2="20" y2="180" stroke="#808080" stroke-width="4" opacity="0.3" />
  <line x1="380" y1="315" x2="380" y2="180" stroke="#808080" stroke-width="4" opacity="0.3" />
  
  <!-- The Kaaba -->
  <g transform="translate(100, 220)">
    <!-- Base shadow -->
    <polygon points="-10,210 210,210 170,225 30,225" fill="#1B1B1B" opacity="0.4" />
    
    <!-- Left Wall (Shadow side) -->
    <polygon points="0,50 100,80 100,210 0,180" fill="#151515" />
    
    <!-- Right Wall (Light side) -->
    <polygon points="100,80 200,50 200,180 100,210" fill="#292929" />
    
    <!-- Golden Kiswah Belt Left -->
    <polygon points="0,90 100,120 100,135 0,105" fill="#FFD700" />
    
    <!-- Golden Kiswah Belt Right -->
    <polygon points="100,120 200,90 200,105 100,135" fill="#FFD700" />
    
    <!-- Kaaba Door (Golden) -->
    <polygon points="130,125 170,113 170,175 130,187" fill="#CC7722" />
    <polygon points="135,130 165,120 165,170 135,178" fill="#FFD700" />
  </g>
  
  <!-- Base/Floor of Holy Mosque -->
  <path d="M0,420 L400,420 L400,500 L0,500 Z" fill="#EAEAEA" />
  <path d="M0,420 C100,415 300,415 400,420" stroke="#FFFFFF" stroke-width="3" fill="none" />
</svg>
